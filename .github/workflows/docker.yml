name: Build and Push Images

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${IMAGE_TAG} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${IMAGE_TAG}

      - name: Build frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${IMAGE_TAG} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${IMAGE_TAG}
      