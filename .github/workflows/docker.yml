name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build backend
        run: |
          docker build -t yourname/backend:${{ steps.vars.outputs.TAG }} ./backend
          docker push yourname/backend:${{ steps.vars.outputs.TAG }}

      - name: Build frontend
        run: |
          docker build -t yourname/frontend:${{ steps.vars.outputs.TAG }} ./frontend
          docker push yourname/frontend:${{ steps.vars.outputs.TAG }}