name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: petrovilya150   # ← ВОТ ЗДЕСЬ

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build backend
        run: |
          docker build -t $DOCKER_USERNAME/backend:${{ steps.vars.outputs.TAG }} ./backend
          docker push $DOCKER_USERNAME/backend:${{ steps.vars.outputs.TAG }}

      - name: Build frontend
        run: |
          docker build -t $DOCKER_USERNAME/frontend:${{ steps.vars.outputs.TAG }} ./frontend
          docker push $DOCKER_USERNAME/frontend:${{ steps.vars.outputs.TAG }}