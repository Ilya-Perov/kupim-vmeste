version: '3.8'

services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}

      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: ${NODE_ENV}

      IMAGE_TAG: ${IMAGE_TAG}

    depends_on:
      - db
      - redis
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: